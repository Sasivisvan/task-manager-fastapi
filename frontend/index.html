<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple task management application built with FastAPI">
    <title>Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Task Manager</h1>
                <div id="user-info" class="user-info hidden">
                    <span id="username-display"></span>
                    <button id="logout-btn" class="btn btn-ghost" onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <!-- Auth Section -->
        <section id="auth-section" class="section">
            <div class="auth-container">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Login</button>
                    <button class="tab" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="form" onsubmit="handleLogin(event)">
                    <h2>Welcome Back</h2>
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="form hidden" onsubmit="handleRegister(event)">
                    <h2>Create Account</h2>
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Choose username" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="Enter email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Choose password (min 6 chars)" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Register</button>
                </form>

                <div id="auth-message" class="message hidden"></div>
            </div>
        </section>

        <!-- Tasks Section -->
        <section id="tasks-section" class="section hidden">
            <!-- Create Task -->
            <div class="card create-task-card">
                <h2>New Task</h2>
                <form id="create-task-form" onsubmit="handleCreateTask(event)">
                    <div class="form-row">
                        <input type="text" id="task-title" placeholder="What needs to be done?" required>
                        <button type="submit" class="btn btn-primary">Add</button>
                    </div>
                    <input type="text" id="task-description" placeholder="Description (optional)" class="desc-input">
                </form>
            </div>

            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                <button class="filter-btn" onclick="filterTasks('active')">Active</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
            </div>

            <!-- Task List -->
            <div id="task-list" class="task-list"></div>

            <div id="tasks-message" class="message hidden"></div>

            <!-- Pagination -->
            <div id="pagination" class="pagination hidden">
                <button id="prev-btn" class="btn btn-ghost" onclick="changePage(-1)">Prev</button>
                <span id="page-info"></span>
                <button id="next-btn" class="btn btn-ghost" onclick="changePage(1)">Next</button>
            </div>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
